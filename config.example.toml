[server]
host = "0.0.0.0"
port = 8081
public_base_url = "http://192.168.1.100:8081"

[device]
id = "xiao-esp32s3-sense-01"

[device.wifi]
ssid = "your-wifi-ssid"
password = "your-wifi-password"

[device.capture]
video_fps = 4
jpeg_quality = 10
frame_size = "SVGA"
camera_profile = "traffic_signal"
audio_sample_rate = 16000
audio_chunk_ms = 100
imu_hz = 50

[device.transport]
video = "udp"
# RTP/JPEG payload budget per UDP packet; datagrams also carry 20 bytes of RTP/JPEG headers.
# The first packet of each frame additionally spends 132 bytes on quantization tables.
video_payload_bytes = 1200
video_reorder_window_ms = 120
video_frame_timeout_ms = 180
# This example key is public. Generate a deployment key with: openssl rand -hex 32
video_auth_key_hex = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
control = "ws"
audio_up = "ws"
audio_down = "ws"

[device.audio_down]
enabled = false

[models]
blind_path = "models/yolo-seg.pt"
obstacle = "models/yoloe-11l-seg-obstacle.pt"
traffic_light = "models/trafficlight.pt"
# Model input size. SVGA camera frames are 800x600; height is padded to 608 for YOLO.
image_width = 800
image_height = 608
torch_device = "cuda:0"
torch_half = true

[vision.thresholds]
blind_path_conf = 0.35
obstacle_conf = 0.35
traffic_light_conf = 0.20
mask_min_area = 0.01

[asr]
enabled = true
provider = "dashscope"
model = "paraformer-realtime-v2"
dashscope_api_key = "replace-with-your-dashscope-api-key"
websocket_base_url = "wss://dashscope.aliyuncs.com/api-ws/v1/inference"
http_base_url = "https://dashscope.aliyuncs.com/api/v1"
sample_rate = 16000
language = "zh-CN"
command_languages = ["zh", "en"]

[speech]
enabled = false
mode = "ui"
provider = "dashscope"
language = "auto"
model = "sambert-zhichu-v1"
audio_format = "pcm"
sample_rate = 16000
volume = 50
rate = 1.0
pitch = 1.0
piper_model_dir = "voice"
piper_voice_zh = "zh_CN-huayan-medium"
piper_voice_en = "en_US-lessac-medium"
piper_use_cuda = false

[web]
title = "AI Glasses Console"
