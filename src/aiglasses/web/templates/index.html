<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Glasses Console</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260513-crosswalk-label" />
  </head>
  <body>
    <main class="shell">
      <section class="video-zone" aria-label="实时画面">
        <header class="topbar">
          <div>
            <h1>AI Glasses Console</h1>
            <p id="mode">idle</p>
          </div>
          <div class="status-strip">
            <span id="control" class="chip">CTRL</span>
            <span id="video" class="chip">VIDEO</span>
            <span id="audio" class="chip">AUDIO</span>
            <span id="asr" class="chip">ASR</span>
          </div>
        </header>

        <div class="frame-wrap">
          <img id="frame" alt="ESP32 camera stream" />
          <canvas id="overlay"></canvas>
          <div id="empty" class="empty">waiting for frames</div>
        </div>

        <div class="metrics">
          <div class="metric metric-primary"><b id="receivedFps">0.0</b><span>received fps</span></div>
          <div class="metric metric-primary"><b id="processedFps">0.0</b><span>processed fps</span></div>
          <div class="metric metric-primary"><b id="maxBackendFps">--</b><span>capacity fps</span></div>
          <div class="metric metric-primary"><b id="fps">0.0</b><span>frontend fps</span></div>
          <div class="metric metric-secondary"><b id="uptime">0s</b><span>uptime</span></div>
          <div class="metric metric-secondary"><b id="light">--</b><span>traffic</span></div>
          <div class="metric metric-secondary"><b id="imuBrief">--</b><span>imu</span></div>
        </div>
      </section>

      <aside class="side">
        <section class="panel command-panel">
          <form id="commandForm">
            <input id="commandInput" type="text" placeholder="输入调试指令，例如：开始导航" autocomplete="off" />
            <button type="submit">Send</button>
          </form>
          <div class="client-audio-control">
            <button id="webSpeechToggle" class="web-speech-button" type="button" aria-pressed="true">网页播报 开</button>
            <span id="webSpeechStatus" class="web-speech-status">仅本窗口</span>
          </div>
          <div class="recording-control">
            <button id="recordingToggle" class="recording-button" type="button">开始录制</button>
            <span id="recordingStatus" class="recording-status">未录制</span>
          </div>
        </section>

        <section class="panel config-panel">
          <h2>设备</h2>
          <form id="deviceConfigForm" class="config-form">
            <label for="targetFps"><span>目标帧率</span><input id="targetFps" type="number" min="1" max="1000" step="1" inputmode="numeric" /></label>
            <label for="jpegQuality"><span>JPEG质量</span><input id="jpegQuality" type="number" min="1" max="63" step="1" inputmode="numeric" /></label>
            <label for="cameraProfile" class="full-row"><span>相机Profile</span><select id="cameraProfile">
              <option value="traffic_signal">traffic_signal</option>
              <option value="default">default</option>
            </select></label>
            <label for="aeLevel"><span>AE Level</span><input id="aeLevel" type="number" min="-2" max="2" step="1" /></label>
            <label for="saturation"><span>Saturation</span><input id="saturation" type="number" min="-2" max="2" step="1" /></label>
            <label for="contrast"><span>Contrast</span><input id="contrast" type="number" min="-2" max="2" step="1" /></label>
            <label for="sharpness"><span>Sharpness</span><input id="sharpness" type="number" min="-2" max="2" step="1" /></label>
            <label for="gainceiling" class="full-row"><span>Gain ceiling</span><input id="gainceiling" type="number" min="2" max="128" step="1" /></label>
            <button type="submit">Apply</button>
          </form>
          <button id="disconnectDevice" class="danger-button" type="button">断开设备连接</button>
          <p id="configStatus" class="config-status">--</p>
        </section>

        <section class="panel config-panel">
          <h2>红绿灯调试</h2>
          <div class="view-toggle">
            <button id="allViewButton" type="button" class="active">全部视图</button>
            <button id="trafficViewButton" type="button">红绿灯视图</button>
          </div>
          <form id="tuningForm" class="config-form">
            <label for="trafficFilterEnabled"><span>滤波器</span><input id="trafficFilterEnabled" type="checkbox" /></label>
            <label for="trafficLightConf"><span>模型threshold</span><input id="trafficLightConf" type="number" min="0" max="1" step="0.01" /></label>
            <label for="trafficSignalClearMargin"><span>blank margin</span><input id="trafficSignalClearMargin" type="number" min="0" max="1" step="0.01" /></label>
            <label for="trafficGoMinConf"><span>go threshold</span><input id="trafficGoMinConf" type="number" min="0" max="1" step="0.01" /></label>
            <label for="trafficStopMinConf"><span>stop threshold</span><input id="trafficStopMinConf" type="number" min="0" max="1" step="0.01" /></label>
            <label for="trafficYellowMinConf"><span>yellow threshold</span><input id="trafficYellowMinConf" type="number" min="0" max="1" step="0.01" /></label>
            <label for="trafficConflictMargin"><span>conflict margin</span><input id="trafficConflictMargin" type="number" min="0" max="1" step="0.01" /></label>
            <label for="trafficRoiEnabled"><span>ROI</span><input id="trafficRoiEnabled" type="checkbox" /></label>
            <label for="trafficRoiXMin"><span>ROI x min</span><input id="trafficRoiXMin" type="number" min="0" max="1" step="0.01" /></label>
            <label for="trafficRoiXMax"><span>ROI x max</span><input id="trafficRoiXMax" type="number" min="0" max="1" step="0.01" /></label>
            <label for="trafficRoiYMin"><span>ROI y min</span><input id="trafficRoiYMin" type="number" min="0" max="1" step="0.01" /></label>
            <label for="trafficRoiYMax"><span>ROI y max</span><input id="trafficRoiYMax" type="number" min="0" max="1" step="0.01" /></label>
            <label for="trafficMinAreaRatio"><span>min area</span><input id="trafficMinAreaRatio" type="number" min="0" max="1" step="0.00001" /></label>
            <label for="trafficMaxAreaRatio"><span>max area</span><input id="trafficMaxAreaRatio" type="number" min="0" max="1" step="0.001" /></label>
            <label for="trafficPreferCenterWeight"><span>center weight</span><input id="trafficPreferCenterWeight" type="number" min="0" max="1" step="0.01" /></label>
            <label for="crosswalkConf" title="只影响斑马线分割结果，不影响绿色盲道分割。提高它可以压掉低置信度的天空/盲道误分割。"><span>斑马线分割阈值</span><input id="crosswalkConf" type="number" min="0" max="1" step="0.01" /></label>
            <label for="crossingGreenRequiredFrames"><span>绿灯稳定帧</span><input id="crossingGreenRequiredFrames" type="number" min="1" max="10" step="1" /></label>
            <label for="crossingObstaclesEnabled" title="开启后，过马路模式会使用障碍物模型输出提醒等待；关闭后，障碍物模型输出不参与过街播报。"><span>过街障碍物提醒</span><input id="crossingObstaclesEnabled" type="checkbox" /></label>
            <label for="roadAlertAreaRatio" title="盲道导航中，斑马线 mask 面积达到该比例时，播报前方发现路口。"><span>路口提示面积</span><input id="roadAlertAreaRatio" type="number" min="0" max="1" step="0.0005" /></label>
            <label for="roadStopAreaRatio" title="盲道导航中，斑马线 mask 面积达到该比例且足够靠近画面底部时，播报请先停下。"><span>路口停下面积</span><input id="roadStopAreaRatio" type="number" min="0" max="1" step="0.0005" /></label>
            <label for="roadStopBottomMin" title="斑马线 mask 最低点达到该画面高度比例时，认为已经靠近路口；0 是顶部，1 是底部。"><span>路口停下底部</span><input id="roadStopBottomMin" type="number" min="0" max="1" step="0.01" /></label>
            <button type="submit">Apply</button>
          </form>
          <p id="tuningStatus" class="config-status">--</p>
          <pre id="trafficDebug" class="traffic-debug">{}</pre>
        </section>

        <section class="panel log-panel">
          <h2>播报 / 指令</h2>
          <div id="log" class="log"></div>
        </section>

        <section class="panel dense">
          <h2>状态</h2>
          <pre id="state">{}</pre>
        </section>
      </aside>
    </main>
    <script src="/static/app.js?v=20260513-crosswalk-label" type="module"></script>
  </body>
</html>
